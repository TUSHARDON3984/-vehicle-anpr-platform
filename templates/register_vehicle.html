{% extends "base.html" %}
{% block title %}Register Vehicle{% endblock %}
{% block content %}
<div class="form-card">
    <h2>Register a Vehicle</h2>
    <form method="POST">
        <label>Plate Number</label>
        <input type="text" name="plate_number" placeholder="e.g. DL01AB1234" required>

        <label>Owner Name</label>
        <input type="text" name="owner_name" required>

        <label>Owner Contact</label>
        <input type="text" name="owner_contact">

        <label>Owner Address</label>
        <input type="text" name="owner_address">

        <label>Vehicle Model</label>
        <input type="text" name="vehicle_model">

        <label>Vehicle Color</label>
        <input type="text" name="vehicle_color">

        <button type="submit" class="btn-primary">Register Vehicle</button>
    </form>
</div>
{% endblock %}
